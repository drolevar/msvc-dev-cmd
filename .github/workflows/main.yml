name: msvc-dev-cmd

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: default
    runs-on: windows-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - name: Check out source code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Download Internet
        run: npm install
      - name: Run eslint
        run: npm run lint
      - name: Enable Developer Command Prompt (amd64)
        uses: ./
        with:
          arch: amd64
      - name: Compile and run some C code (amd64)
        shell: cmd
        run: |
          cl.exe hello.c
          hello.exe
      - name: Enable Developer Command Prompt (amd64_x86)
        uses: ./
        with:
          arch: amd64_x86
      - name: Compile and run some C code (x86)
        shell: cmd
        run: |
          cl.exe hello.c
          hello.exe
      - name: Enable Developer Command Prompt (amd64_arm)
        uses: ./
        with:
          arch: amd64_arm
      - name: Compile some C code (arm)
        shell: cmd
        run: |
          cl.exe hello.c
          dumpbin /headers hello.exe
      - name: Enable Developer Command Prompt (amd64_arm64)
        uses: ./
        with:
          arch: amd64_arm64
      - name: Compile some C code (arm64)
        shell: cmd
        run: |
          cl.exe hello.c
          dumpbin /headers hello.exe
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - name: Check out source code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - run: npm install
      - run: npm audit --audit-level=moderate --production
      - run: npm audit --audit-level=critical
  alias-arch:
    name: arch aliases
    runs-on: windows-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - name: Check out source code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Download Internet
        run: npm install
      - name: Enable Developer Command Prompt
        uses: ./
        with:
          arch: Win32
      - name: Compile and run some C code
        shell: cmd
        run: |
          cl.exe hello.c
          hello.exe
